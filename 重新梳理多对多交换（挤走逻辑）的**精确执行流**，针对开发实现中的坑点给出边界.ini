## 五、数据结构建议

```typescript
interface Group {
    id: string;
    blocks: Block[];  // 包含的拼图块
    boundingBox: Rect;  // 外接矩形，用于快速碰撞检测
    isLocked: boolean;  // 是否已拼接到正确位置
    
    // 关键：记录相对位置关系，用于移动时保持形状
    relativePositions: Map<Block, Vector2>;  // block -> (rowOffset, colOffset)
}

// 交换事务上下文（用于回滚）
interface ExchangeTransaction {
    timestamp: number;
    activeGroupSnapshot: GroupState;
    passiveGroupSnapshots: GroupState[];
    emptySlotsSnapshot: Set<Slot>;
}
```

---

## 六、常见Bug排查清单

按此顺序检查你的实现：

1. **空位计算时机**：是否在移动被动组**之前**就计算好了空位？（不能边移边算）
2. **事务原子性**：如果连锁挤走到第3层失败，是否回滚了第1、2层的移动？
3. **形状保持**：被动组移动后，块之间是否仍保持上下左右连通？（检查曼哈顿距离）
4. **坐标系混淆**：使用的是**网格坐标**还是**像素坐标**？（碰撞检测用网格，动画用像素）
5. **GroupID同步**：组被挤走后如果拆分了，是否正确生成了新的GroupID并更新Block引用？

**调试技巧**：在每次交换前打印日志：
```
[Exchange] Active: GroupA(3blocks) -> (2,3)
[Exchange] Passive: GroupB(2blocks) evacuated to (5,6),(5,7)
[Exchange] Empty slots available: 5
[Exchange] Chain depth: 1
```

重新梳理多对多交换（挤走逻辑）的**精确执行流**，针对开发实现中的坑点给出边界条件和原子操作定义：

## 一、核心概念澄清（先对齐术语）

### 1.1 参与方定义
- **主动组(ActiveGroup)**：玩家正在拖动的拼图组（已拾取，跟随手指）
- **被动组(PassiveGroup)**：占据目标位置的已有拼图组（被碰撞方）
- **空位(EmptySlots)**：网格中未被任何拼图块占据的坐标集合
- **缓存区(StagingArea)**：临时存储被挤走组的位置（逻辑概念，非视觉）

### 1.2 关键区分
**不是"交换位置"，而是"挤占+填充"**：
- 错误理解：A组去B组位置，B组去A组原位置（互换）
- **正确逻辑**：A组去目标位置，B组被**挤到空位**（A不动时B的位置 ≠ A原位置）

---

## 二、多对多交换的触发条件（必须同时满足）

```typescript
// 伪代码：触发判定
function canTriggerExchange(activeGroup: Group, dropPos: Vector2): boolean {
    // 1. 计算主动组在dropPos位置会占据的网格坐标集合
    const targetSlots = calculateOccupiedSlots(activeGroup, dropPos);
    
    // 2. 检测targetSlots与现有组的碰撞
    const collisions = detectCollisions(targetSlots);
    
    // 3. 判定条件
    return (
        collisions.length > 0 &&  // 有碰撞（有被动组）
        !collisions.includes(activeGroup) &&  // 不是与自己碰撞
        collisions.every(group => !group.isLocked)  // 被动组均未锁定
    );
}
```

---

## 三、原子执行步骤（严格顺序）

### 步骤0：预处理（拖动释放瞬间）
1. **快照当前状态**：记录所有组的当前网格坐标（用于回滚）
2. **标记主动组**：ActiveGroup进入"待提交"状态，原位置标记为**临时空位**

### 步骤1：空位预计算（最关键）
在被挤走组移动前，必须先确定**它将去哪里**：

```typescript
// 空位查找算法（优先级排序）
function findEvacuationSlots(passiveGroup: Group, excludedSlots: Set): Slot[] {
    const groupSize = passiveGroup.blocks.length;
    
    // 策略1：查找靠近原位置的空位（保持局部性）
    const nearbyEmpty = findEmptySlotsNear(
        passiveGroup.center, 
        radius = 3,
        excludedSlots  // 排除主动组即将占据的位置
    );
    
    if (nearbyEmpty.length >= groupSize) {
        return nearbyEmpty.slice(0, groupSize);
    }
    
    // 策略2：全局查找任意连续空位
    return findAnyContinuousEmptySlots(groupSize, excludedSlots);
}
```

**关键约束**：空位必须是**连续的**，且形状能容纳整个被动组（保持组的形状不变）

### 步骤2：冲突检测（事务性检查）
在执行前验证整个链条的可行性：

```typescript
function validateExchangeChain(activeGroup, passiveGroups, emptySlots): boolean {
    // 计算被动组被挤走后留下的空位
    const vacatedSlots = passiveGroups.flatMap(g => g.currentSlots);
    
    // 总空位需求 = 所有被动组块数之和
    const totalNeeded = passiveGroups.reduce((sum, g) => sum + g.blocks.length, 0);
    
    // 总空位供给 = 原有空位 + 主动组原位置释放的空位
    const totalAvailable = emptySlots.length + activeGroup.blocks.length;
    
    if (totalNeeded > totalAvailable) {
        return false;  // 空位不足，拒绝移动
    }
    
    // 检查被动组是否能保持形状完整移动（不能被拆分到不连续区域）
    return passiveGroups.every(g => canFitInSlots(g, findEvacuationSlots(g)));
}
```

### 步骤3：执行位移（原子操作）

**执行顺序必须是并发的（视觉上同时），逻辑上按依赖层级**：

```typescript
// 第一层：被动组位移（被挤走）
passiveGroups.forEach(group => {
    const destSlots = findEvacuationSlots(group, activeGroup.targetSlots);
    group.moveTo(destSlots);  // 触发位移动画
});

// 第二层：主动组填入
activeGroup.moveTo(targetSlots);

// 第三层：原位置标记为空位（供其他被动组使用，如果是连锁反应）
releaseSlots(activeGroup.originalSlots);
```

**关键细节**：
- 如果被动组有**多个**（主动组很大，同时碰撞多个小组），它们**同时**被挤走，各自寻找独立空位
- 被动组的原位置立即成为**可用空位**，可供其他被动组填充（连锁挤走）

### 步骤4：形状完整性校验（防拆分）
移动后必须验证每个被动组：
- 组内所有块的新位置必须保持**连通性**（上下左右相邻）
- 如果组被拆散（无法找到连续空位），则**整个事务回滚**

---

## 四、边界条件与异常处理

### 4.1 空位不足场景
```typescript
if (!validateExchangeChain(...)) {
    // 策略A：弹性回弹（Rubber Band）
    activeGroup.animateBackToOriginal();
    
    // 策略B：部分填充（仅当被动组可拆分且游戏支持）
    // 不推荐，会破坏游戏逻辑
    
    // 策略C：拒绝移动（Snap到最近合法位置）
    const legalPos = findNearestLegalPosition(activeGroup);
    activeGroup.snapTo(legalPos);
}
```

### 4.2 连锁挤走（Chain Reaction）
当被动组被挤到的空位恰好是另一个组的位置时：

**深度限制**：设置最大连锁层级（如3层），防止无限递归：
```typescript
let chainDepth = 0;
const MAX_CHAIN = 3;

while (hasCollisions && chainDepth < MAX_CHAIN) {
    resolveCurrentCollisions();
    chainDepth++;
}

if (chainDepth >= MAX_CHAIN) {
    rollbackAll();  // 回滚所有已执行移动
}
```

### 4.3 组被拆分的处理
如果被动组无法找到足够**连续**的空位保持形状：

```typescript
// 方案1：禁止本次移动（保守策略）
if (!canFitAsWhole(passiveGroup, destSlots)) {
    return false;  // 触发回滚
}

// 方案2：允许临时拆分（激进策略，需游戏支持）
// 被动组拆分为多个子组，分别占据可用空位
// 注意：这会导致原组关系断裂，需更新GroupID
```

